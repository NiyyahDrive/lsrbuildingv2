<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script>
        // Redirect to index.html for SPA routing
        const path = window.location.pathname.replace(/^\/lsrbuildingv2\//, '/');
        if (path !== '/' && !path.includes('.')) {
            window.location.replace('/lsrbuildingv2/#' + path);
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
